name: Publish Static Site to Netlify

on:
  push:
    branches: [ master ]
    paths:
      - 'static-site/**'
      - '.github/workflows/netlify.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'static-site/**'
      - '.github/workflows/netlify.yml'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-new-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-new-

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build static site
        run: ./gradlew :static-site:assemble --no-daemon

      - name: Deploy to Netlify (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=static-site/build/site --prod
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Deploy to Netlify (preview)
        if: github.event_name == 'pull_request'
        id: netlify_preview
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=static-site/build/site
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.netlify_preview.outputs.NETLIFY_OUTPUT }}`;
            const urlMatch = output.match(/Website Draft URL:\s*(https:\/\/[^\s]+)/);
            const url = urlMatch ? urlMatch[1] : 'Preview URL not found in deploy output';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Netlify Preview\n\nDeploy preview: ${url}`
            });
