# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    # Service containers to run with `container-job`
    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres
        # Provide the password for postgres
        env:
          POSTGRES_PASSWORD: mysecretpassword
          POSTGRES_DB: skadi
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432

    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive
        token: ${{ secrets.CLONE_PAT }}
    - uses: actions/cache@v2.1.4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-new-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-new-
    - name: Set up JDK 11
      uses: actions/setup-java@v1
      with:
        java-version: 11
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew build
      env:
        SQL_PASSWORD: mysecretpassword
        SQL_USER: postgres
        SQL_DB: skadi
        SQL_HOST: "localhost:5432"
        GITHUB_SECRET: ${{ secrets.OAUTH_SECRET }}
        GITHUB_ID: ${{ secrets.OAUTH_ID }}
        COOKIE_SALT: ${{ secrets.COOKIE_SALT }}
    - name: Archive test results
      uses: actions/upload-artifact@v2
      if: ${{ always() }}
      with:
        name: test-results
        path: web/build/reports
    - name: Login to Scaleway Container Registry
      if: ${{ github.event_name == 'workflow_dispatch' }}
      uses: docker/login-action@v1
      with:
        registry: rg.nl-ams.scw.cloud/cloud-skadi-mps
        username: nologin
        password: ${{ secrets.SCALEWAY_TOKEN }}
    - name: Build with installDist
      if: ${{ github.event_name == 'workflow_dispatch' }}
      run: ./gradlew :web:installDist
    - name: build docker images
      if: ${{ github.event_name == 'workflow_dispatch' }}
      uses: docker/build-push-action@v2
      with:
        context: web
        push: true
        tags: rg.nl-ams.scw.cloud/cloud-skadi-mps/web:latest

