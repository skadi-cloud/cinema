# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Release Web App

on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive
    - uses: actions/cache@v2.1.4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-new-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-new-
    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: 11
        distribution: 'adopt'
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Login to Scaleway Container Registry
      uses: docker/login-action@v1
      with:
        registry: rg.nl-ams.scw.cloud/cloud-skadi-mps
        username: nologin
        password: ${{ secrets.SCALEWAY_TOKEN }}

    - name: Docker meta
      id: meta
      uses: crazy-max/ghaction-docker-meta@v2
      with:
        images: rg.nl-ams.scw.cloud/cloud-skadi-mps/web
        tags: |
          type=semver,pattern={{version}}
    - name: Build with installDist
      run: ./gradlew :web:installDist
    - name: build docker images
      uses: docker/build-push-action@v2
      with:
        context: web
        push: true
        tags: ${{ steps.meta.outputs.tags }}

