# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Release Web App

on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.1
      with:
        submodules: recursive
    - uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-new-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-new-
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Login to Scaleway Container Registry
      uses: docker/login-action@v3.6.0
      with:
        registry: rg.nl-ams.scw.cloud/cloud-skadi-mps
        username: nologin
        password: ${{ secrets.SCALEWAY_TOKEN }}

    - name: Docker meta
      id: meta
      uses: crazy-max/ghaction-docker-meta@v5.10.0
      with:
        images: rg.nl-ams.scw.cloud/cloud-skadi-mps/web
        tags: |
          type=semver,pattern={{version}}
    - name: Build with installDist
      run: ./gradlew :web:installDist
    - name: Set output
      id: vars
      run: echo ::set-output name=tag::${GITHUB_REF#refs/*/}
    - name: build docker images
      uses: docker/build-push-action@v6.19.2
      with:
        context: web
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        build-args: release=${{ steps.vars.outputs.tag }}
    - name: Create Sentry release
      uses: getsentry/action-release@v3.4.0
      env:
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      with:
        environment: production
        set_commits: skip
        version: ${{ steps.vars.outputs.tag }}

