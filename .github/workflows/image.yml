name: playground-images

on:
  workflow_dispatch:
  release:
    types:
      - created

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v1
        with:
          registry: rg.nl-ams.scw.cloud/cloud-skadi-mps
          username: nologin
          password: ${{ secrets.SCALEWAY_TOKEN }}

      - uses: actions/checkout@v2
        with:
          submodules: recursive
      - uses: actions/cache@v2.1.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-new-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-new-
      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: 11
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :playground-image:publishAll
        env:
          DOCKER_REGISTRY: rg.nl-ams.scw.cloud/cloud-skadi-mps
