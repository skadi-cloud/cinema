name: playground-images

on:
  workflow_dispatch:
  release:
    types:
      - created

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mps: [ 2020.3.3, 2020.3.1, 2020.2.3, 2021.1]
        include:
          - mps: 2020.3.3
            kernelF: 4731.f5286c0
          - mps: 2020.2.3
            kernelF: 4726.e49ca16
    steps:
      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3.1.0
        with:
          registry: rg.nl-ams.scw.cloud/cloud-skadi-mps
          username: nologin
          password: ${{ secrets.SCALEWAY_TOKEN }}

      - uses: actions/checkout@v5.0.0
        with:
          submodules: recursive
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-new-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-new-
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :playground-image:pushImage
        env:
          MPS_VERSION: ${{ matrix.mps }}
          KERNELF_VERSION: ${{ matrix.kernelF }}
          DOCKER_REGISTRY: rg.nl-ams.scw.cloud/cloud-skadi-mps
