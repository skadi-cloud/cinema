kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: web-ingress
spec:
  rules:
    - host: skadi.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-frontend
                port:
                  number: 80
    - host: staging.skadi.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-frontend
                port:
                  number: 80